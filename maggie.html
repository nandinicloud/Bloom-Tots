<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maggi Style Ad Transition</title>
    <style>
        :root {
            --maggi-red: #e41e26;
            --maggi-yellow: #ffdb00;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            background-color: var(--maggi-yellow);
        }

        .ad-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .slide {
            position: absolute;
            opacity: 0;
            transform: scale(0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        /* The "Active" State that mimics the pop-in */
        .slide.active {
            opacity: 1;
            transform: scale(1.2);
            pointer-events: auto;
        }

        .text-main {
            color: var(--maggi-red);
            font-size: 5rem;
            text-transform: uppercase;
            line-height: 0.9;
            text-shadow: 4px 4px 0px white;
        }

        .spice-burst {
            background: var(--maggi-red);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 20px;
            transform: rotate(-5deg);
        }

        /* Animation for the "Floating" ingredients feel */
        @keyframes float {
            0% { transform: translateY(0px) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(-5deg); }
        }

        .floating {
            animation: float 2s ease-in-out infinite;
        }

    </style>
</head>
<body>

<div class="ad-container">
    <div class="slide active" id="slide1">
        <h1 class="text-main">BORED OF<br>PLAIN FOOD?</h1>
    </div>

    <div class="slide" id="slide2">
        <h1 class="text-main">JUST ADD<br>THE MAGIC!</h1>
        <div class="spice-burst floating">✨ MASALA-E-MAGIC ✨</div>
    </div>

    <div class="slide" id="slide3">
        <h1 class="text-main">TASTE<br>REINVENTED!</h1>
    </div>
</div>

<script>
    const slides = document.querySelectorAll('.slide');
    let currentSlide = 0;

    function nextSlide() {
        // Remove active class from current
        slides[currentSlide].classList.remove('active');
        
        // Move to next slide
        currentSlide = (currentSlide + 1) % slides.length;
        
        // Add active class to new slide
        setTimeout(() => {
            slides[currentSlide].classList.add('active');
        }, 100); // Slight delay for smoother transition
    }

    // Change slide every 2.5 seconds
    setInterval(nextSlide, 2500);
</script>

</body>
</html>
