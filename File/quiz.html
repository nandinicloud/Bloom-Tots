<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Child Development Early Signs Quiz</title>

<style>

body{
font-family: Arial, sans-serif;
background:#bbc7f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.quiz-box{
background:white;
width:520px;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

.question{
font-size:18px;
margin-bottom:15px;
}

.option{
background:#f2f2f2;
padding:10px;
margin:8px 0;
border-radius:6px;
cursor:pointer;
}

.option:hover{
background:#dbe6ff;
}

button{
margin-top:15px;
padding:10px;
width:100%;
border:none;
background:#4c6ef5;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#364fc7;
}

#result{
font-size:18px;
margin-top:20px;
text-align:center;
}

.disclaimer{
font-size:12px;
color:#666;
margin-top:10px;
text-align:center;
}

</style>
</head>

<body>

<div class="quiz-box">

<h2>Child Early Signs Quiz</h2>

<div id="quiz">
<div id="question" class="question"></div>
<div id="options"></div>
<button onclick="nextQuestion()">Next</button>
</div>

<div id="result"></div>

<p class="disclaimer">
This quiz is for awareness only and not a medical diagnosis.
</p>

</div>

<script>

const quizData = [

{
question:"Does the child often avoid eye contact?",
options:["Often","Sometimes","Rarely"],
type:"autism"
},

{
question:"Does the child have difficulty sitting still?",
options:["Often","Sometimes","Rarely"],
type:"adhd"
},

{
question:"Does the child delay speaking simple words (age 2-3)?",
options:["Yes","Not sure","No"],
type:"language"
},

{
question:"Does the child repeat actions like spinning objects or lining toys?",
options:["Often","Sometimes","Rarely"],
type:"autism"
},

{
question:"Does the child get extremely upset with small routine changes?",
options:["Often","Sometimes","Rarely"],
type:"autism"
},

{
question:"Does the child interrupt frequently or act impulsively?",
options:["Often","Sometimes","Rarely"],
type:"adhd"
},

{
question:"Does the child struggle to play or interact with other children?",
options:["Often","Sometimes","Rarely"],
type:"social"
},

{
question:"Does the child have frequent emotional outbursts?",
options:["Often","Sometimes","Rarely"],
type:"emotion"
},

{
question:"Does the child struggle to focus on tasks or instructions?",
options:["Often","Sometimes","Rarely"],
type:"adhd"
},

{
question:"Does the child respond when their name is called?",
options:["Rarely","Sometimes","Usually"],
type:"autism"
}

]

let currentQuestion = 0

let scores = {
adhd:0,
autism:0,
language:0,
social:0,
emotion:0
}

function loadQuestion(){

let q = quizData[currentQuestion]

document.getElementById("question").innerText = q.question

let optionsHTML=""

q.options.forEach(option=>{
optionsHTML += `<div class="option" onclick="selectAnswer('${option}')">${option}</div>`
})

document.getElementById("options").innerHTML = optionsHTML
}

function selectAnswer(option){

let type = quizData[currentQuestion].type

if(option==="Often" || option==="Yes" || option==="Rarely"){
scores[type]++
}

}

function nextQuestion(){

currentQuestion++

if(currentQuestion < quizData.length){

loadQuestion()

}else{

showResult()

}

}

function showResult(){

document.getElementById("quiz").style.display="none"

let resultText="Typical Development"

let max = 0
let condition=""

for(let key in scores){
if(scores[key] > max){
max = scores[key]
condition = key
}
}

if(condition==="adhd"){
resultText="Possible Attention traits related to ADHD."
}

if(condition==="autism"){
resultText="Possible traits related to Autism spectrum."
}

if(condition==="language"){
resultText="Possible language development delay."
}

if(condition==="social"){
resultText="Possible social interaction difficulty."
}

if(condition==="emotion"){
resultText="Possible emotional regulation difficulty."
}

document.getElementById("result").innerHTML =
"<b>Quiz Result:</b><br>"+resultText

}

loadQuestion()

</script>

</body>
</html>
