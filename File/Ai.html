<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Child Support Chat</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  min-height:100vh;
  background: linear-gradient(135deg,
    #fde2e4,
    #e0e7ff,
    #e8faff,
    #fff1e6
  );
  background-size:300% 300%;
  animation: softMove 12s ease infinite;
  display:flex;
  justify-content:center;
  align-items:center;
}

@keyframes softMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* BIGGER CHAT BOX */
.chat-container{
  width:520px;
  height:650px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(18px);
  border-radius:26px;
  box-shadow:0 30px 80px rgba(0,0,0,0.15);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
.chat-header{
  padding:20px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  background: linear-gradient(90deg,#f6c1d1,#cdb4ff,#bde0fe);
  color:#333;
}

/* MESSAGES */
.chat-messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  font-size:14px;
}

.bot,.user{
  max-width:80%;
  margin-bottom:14px;
  padding:14px 18px;
  border-radius:18px;
  line-height:1.6;
}

.bot{
  background:#ffffff;
  align-self:flex-start;
  color:#444;
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.user{
  background: linear-gradient(90deg,#f6c1d1,#cdb4ff,#bde0fe);
  align-self:flex-end;
  color:#222;
}

/* INPUT AREA */
.chat-input{
  display:flex;
  gap:12px;
  padding:18px;
  background:rgba(255,255,255,0.6);
}

.chat-input input{
  flex:1;
  padding:14px 16px;
  border-radius:24px;
  border:1px solid #ddd;
  outline:none;
  font-size:14px;
}

.chat-input button{
  padding:14px 22px;
  border-radius:24px;
  border:none;
  cursor:pointer;
  font-weight:500;
  background: linear-gradient(90deg,#f6c1d1,#cdb4ff,#bde0fe);
  color:#333;
  transition:0.3s;
}

.chat-input button:hover{
  transform:scale(1.05);
  opacity:0.9;
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="chat-header">
    🌱 Child Support Assistant
  </div>

  <div class="chat-messages" id="messages">
    <div class="bot">
      Hello 👋  
      I’m here to support parents and caregivers with general child-development questions.
    </div>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
const messages = document.getElementById("messages");
const input = document.getElementById("userInput");

function sendMessage(){
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  setTimeout(()=>{ botReply(text); },600);
}

function addMessage(text,type){
  const msg=document.createElement("div");
  msg.className=type;
  msg.innerText=text;
  messages.appendChild(msg);
  messages.scrollTop=messages.scrollHeight;
}

function botReply(text){
  let reply="Thank you for sharing. Every child’s feelings matter.";

  const t=text.toLowerCase();

  if(t.includes("anger"))
    reply="Children often express anger when they feel unheard. Gentle listening can help.";
  else if(t.includes("anxiety"))
    reply="Anxiety can appear as fear or worry. Consistent reassurance is helpful.";
  else if(t.includes("study"))
    reply="Learning challenges are common and manageable with patience and guidance.";
  else if(t.includes("sleep"))
    reply="Healthy sleep routines support emotional balance in children.";
  else if(t.includes("help"))
    reply="Seeking support shows care and responsibility toward your child.";

  addMessage(reply,"bot");
}

input.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});
</script>

</body>
</html>
