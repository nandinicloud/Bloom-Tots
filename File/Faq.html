<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ – Child Psychology</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  min-height:100vh;
  background: linear-gradient(135deg,#fde2e4,#e0e7ff,#e8faff,#fff1e6);
  background-size:300% 300%;
  animation: softMove 12s ease infinite;
  padding:100px 0 40px; /* space for navbar */
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:18px 40px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(14px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:100;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.navbar h2{
  color:#6d5dfc;
  font-weight:600;
}

.navbar ul{
  list-style:none;
  display:flex;
  gap:28px;
}

.navbar ul li a{
  text-decoration:none;
  color:#444;
  font-size:15px;
  font-weight:500;
  transition:0.3s;
}

.navbar ul li a:hover{
  color:#6d5dfc;
}

@keyframes softMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.faq-container{
  width:90%;
  max-width:900px;
  margin:0 auto;
}

h1{
  text-align:center;
  margin-bottom:30px;
  font-weight:600;
  color:#6d5dfc;
}

/* FAQ BOX */
.faq{
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(14px);
  margin-bottom:18px;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.12);
  transition:transform 0.3s ease;
}

.faq:hover{
  transform: translateY(-4px);
}

.faq-question{
  padding:20px 25px;
  cursor:pointer;
  font-size:16px;
  font-weight:500;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.faq-question:hover{
  background: rgba(0,0,0,0.03);
}

.faq-answer{
  max-height:0;
  overflow:hidden;
  padding:0 25px;
  font-size:14px;
  line-height:1.7;
  color:#444;
  transition:max-height 0.5s ease, padding 0.5s ease;
}

.faq.active .faq-answer{
  max-height:500px;
  padding:15px 25px 20px;
}

.icon{
  font-size:20px;
  transition: transform 0.3s ease;
}

.faq.active .icon{
  transform:rotate(45deg);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h2>ChildCare</h2>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">FAQ</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<div class="faq-container">
  <h1>Frequently Asked Questions</h1>

  <!-- FAQs (unchanged) -->
  <!-- FAQ 1 -->
  <div class="faq">
    <div class="faq-question">
      <span>When should I consider child counselling?</span>
      <span class="icon">+</span>
    </div>
    <div class="faq-answer">
      Counselling may help if your child shows prolonged behavioral changes, emotional distress, or difficulties in learning or social interaction.
    </div>
  </div>

  <!-- (rest of your FAQs remain same) -->

</div>

<script>
const faqs = document.querySelectorAll(".faq");
faqs.forEach(faq => {
  faq.querySelector(".faq-question").addEventListener("click", () => {
    faq.classList.toggle("active");
  });
});
</script>

</body>
</html>
