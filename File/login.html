<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pastel Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(
        120deg,
        #fce1ec,
        #fdebd3,
        #e8f8f5,
        #eaf2ff,
        #f3e8ff
      );
      background-size: 300% 300%;
      animation: softMove 10s ease infinite;
    }

    @keyframes softMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .login-box {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(14px);
      padding: 35px;
      width: 360px;
      border-radius: 18px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-box:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.15);
    }

    h2 {
      color: #555;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .input-box {
      margin-bottom: 18px;
    }

    .input-box input {
      width: 100%;
      padding: 12px 15px;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
      font-size: 14px;
      background: #fff;
      transition: 0.3s;
    }

    .input-box input:focus {
      border-color: #bfa5ff;
      box-shadow: 0 0 8px rgba(191,165,255,0.4);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      background: linear-gradient(
        90deg,
        #f6c1d1,
        #f9d9b7,
        #cdeee9,
        #d6e4ff,
        #e6d9ff
      );
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .extra {
      margin-top: 15px;
      font-size: 13px;
      color: #666;
    }

    .extra a {
      color: #8b6cff;
      text-decoration: none;
      font-weight: 500;
    }

    .extra a:hover {
      text-decoration: underline;
    }
    
/* FOOTER */

.footer{
background:#ced1ff;
/* color:white; */
padding:40px 0 10px 0;
margin-top:40px;
font-size: medium;
}

.footer-container{
width:85%;
margin:auto;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
}

.footer h3,.footer h4{
margin-bottom:10px;
}

.footer p{
font-size:14px;
line-height:1.6;
}

.footer-links ul{
list-style:none;
}

.footer-links li{
margin-bottom:8px;
}

.footer-links a{
color:#ddd;
text-decoration:none;
}

.footer-links a:hover{
color:white;
}

.footer-bottom{
text-align:center;
border-top:1px solid rgba(255,255,255,0.2);
margin-top:20px;
padding-top:10px;
}
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Hello Again 🌸</h2>

    <div class="input-box">
      <input type="text" placeholder="Username" required>
    </div>

    <div class="input-box">
      <input type="password" placeholder="Password" required>
    </div>

    <button class="login-btn">Login</button>

    <div class="extra">
      <p>Forgot password? <a href="#">Reset</a></p>
    </div>
  </div>

</body>
</html>
